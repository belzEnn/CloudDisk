<div class="login-card">
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; background-color: #f8f9fa; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 320px; text-align: center; }
        .login-card h2 { margin-top: 0; color: #0984e3; font-weight: 700; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; color: #636e72; margin-bottom: 5px; font-weight: 600; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #dfe6e9; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        .form-group input:focus { outline: none; border-color: #0984e3; }
        .btn-login { width: 100%; background: #0984e3; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-login:hover { background: #74b9ff; }
        .error-msg { color: #ff7675; font-size: 0.85rem; margin-bottom: 15px; font-weight: 600; }
    </style>
    <h2 id="form-title">Login to DDDrive</h2>
    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form id="auth-form" action="/login" method="post">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn-login" id="submit-btn">Log In</button>
    </form>

    <div style="margin-top: 20px; font-size: 0.8rem;">
        <a href="#" id="toggle-auth" style="color: #0984e3; text-decoration: none;">No account? Register here</a>
    </div>
</div>

<script>
    const form = document.getElementById('auth-form');
    const title = document.getElementById('form-title');
    const btn = document.getElementById('submit-btn');
    const toggle = document.getElementById('toggle-auth');

    let isLogin = true;

    toggle.onclick = (e) => {
        e.preventDefault();
        isLogin = !isLogin;
        
        if (isLogin) {
            form.action = '/login';
            title.innerText = 'Login to DDDrive';
            btn.innerText = 'Log In';
            toggle.innerText = 'No account? Register here';
        } else {
            form.action = '/register';
            title.innerText = 'Create Account';
            btn.innerText = 'Sign Up';
            toggle.innerText = 'Already have an account? Login';
        }
    };
</script>
