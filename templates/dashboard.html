<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    (function() {
      if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <title>DDDrive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body class="app-body">

  <header class="topbar">
    <div class="topbar-left">
      <span class="logo-text">DDDrive</span>
    </div>

    <div class="topbar-center">
      <div class="upload-pill" id="upload-pill">
        <label class="pill-trigger" for="file-input" id="pill-trigger" title="Upload file">
          <svg id="pill-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          </svg>
        </label>
        <div class="pill-body" id="pill-body">
          <span class="pill-name" id="pill-name"></span>
          <div class="pill-track">
            <div class="pill-fill" id="pill-fill"></div>
          </div>
        </div>
        <span class="pill-pct" id="pill-pct"></span>
      </div>
    </div>

    <div class="topbar-right">
      <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme" id="theme-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
        </svg>
      </button>
      <a href="/logout" class="btn-logout">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Log out
      </a>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <nav>
        <a href="#" class="nav-item active">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          All files
        </a>
      </nav>
    </aside>

    <main class="content">
      <div class="content-top">
        <h2>All files</h2>
      </div>

      <form id="upload-form" action="/upload" method="post" enctype="multipart/form-data" style="display:none">
        <input type="file" name="file" id="file-input">
        <input type="hidden" name="username" value="{{ username }}">
      </form>

      <div class="files-box">
        <div class="files-head">
          <div></div>
          <div>Name</div>
          <div>Date</div>
          <div class="col-right">Actions</div>
        </div>

        {% if not files %}
        <div class="empty-state">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <p>No files yet. Upload your first file!</p>
        </div>
        {% endif %}

        {% for file in files %}
        <div class="file-row">
          <div class="file-icon file-icon--{{ file.file_icon.split('.')[0] }}">
            <img src="{{ url_for('assets', path=file.file_icon) }}" width="16" height="16" alt="">
          </div>
          <div class="file-name">{{ file.file_name }}</div>
          <div class="file-date">{{ file.time.strftime('%b %d, %Y') }}</div>
          <div class="file-actions">
            <form action="/download" method="post" style="display:inline">
              <input type="hidden" name="file_id" value="{{ file.id }}">
              <button type="submit" class="act-btn act-btn--download" title="Download {{ file.file_name }}">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="7 10 12 15 17 10"/>
                  <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
              </button>
            </form>
            <form class="delete-form" style="display:inline">
              <input type="hidden" name="file_id" value="{{ file.id }}">
              <button type="submit" class="act-btn act-btn--delete" title="Delete {{ file.file_name }}">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                  <path d="M10 11v6"/><path d="M14 11v6"/>
                  <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                </svg>
              </button>
            </form>
          </div>
        </div>
        {% endfor %}
      </div>
    </main>
  </div>

  <div id="modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-box">
      <div class="modal-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6"/><path d="M14 11v6"/>
        </svg>
      </div>
      <h3 id="modal-title">Delete file?</h3>
      <p>This action cannot be undone.</p>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn-secondary">Cancel</button>
        <button id="modal-confirm" class="btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <div id="drop-overlay" class="drop-overlay">
    <div class="drop-overlay-inner">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p>Drop to upload</p>
    </div>
  </div>

  <script src="{{ url_for('static', path='main.js') }}" defer></script>
</body>
</html>
