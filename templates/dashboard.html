<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>DDDrive</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <script src="{{ url_for('static', path='main.js') }}" defer></script>
</head>
<body>
    <div class="topbar">
        <h2 class="logo">DDDrive</h2>
        <div class="user-section">
            <span class="username">{{ username }}</span>
            <a href="/" class="logout-link">Log out</a>
        </div>
    </div>
    
    <div class="container">
        <section class="upload-section">
            <h3>Upload new file</h3>
            <form action="/upload" method="post" enctype="multipart/form-data" class="upload-form">
                <input type="file" name="file" id="file" required>
                <input type="hidden" name="username" value="{{ username }}">
                <button type="submit" class="btn-primary">Upload</button>
            </form>
        </section>

        <hr>

        <section class="files-section">
            <h3>Your files</h3>
            <table class="files-table">
                <thead>
                    <tr>
                        <th>File name</th>
                        <th style="text-align: right;">Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for file in files %}
                    <tr>
                        <td>{{ file.file_name }}</td>
                        <td style="text-align: right;">
                            <form action="/download" method="post" style="display: inline;">
                                <input type="hidden" name="file_id" value="{{ file.id }}">
                                <button type="submit" class="download-button">
                                    <img src="{{ url_for('assets', path='download.png') }}" width="20" height="20" alt="Download">
                                </button>
                            </form>
                        <form class="delete-form" style="display: inline;">
                            <input type="hidden" name="file_id" value="{{ file.id }}">
                            <button type="submit" class="delete-button">
                                <img src="{{ url_for('assets', path='delete.png') }}" width="20" height="20" alt="Delete">
                            </button>
                        </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </section>
    </div>
    <div id="custom-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h4>Delete the file?</h4>
            <p>Are you sure you want to delete this file?</p>
            <div class="modal-actions">
                <button id="modal-cancel" class="btn-secondary">Cancel</button>
                <button id="modal-confirm" class="btn-danger">Delete</button>
            </div>
        </div>
    </div>
</body>
</html>
